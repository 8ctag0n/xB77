version: "3.9"

# xB77 Local Stack — full Arbitrum Stylus + EVM dev environment
#
# Services:
#   nitro       — Arbitrum Nitro dev node (Stylus-enabled, chain 412346)
#   anvil       — EVM fork (Solidity contracts + SDK tests)
#   nargo-prover— Noir/Barretenberg proof generation worker (optional)
#
# Quick start:
#   docker compose up -d nitro
#   scripts/e2e_zk_stylus.sh
#
# Fallback (sandboxed envs without cgroup namespaces — e.g. CI containers):
#   MOUNT=$(podman image mount docker.io/offchainlabs/nitro-node:v3.2.1-d81324d)
#   $MOUNT/usr/local/bin/nitro --dev --http.addr=0.0.0.0 --http.port=8547 \
#     --http.api=net,web3,eth,arb,debug --http.vhosts='*' --ws.addr=0.0.0.0 \
#     --ws.port=8548 --ws.origins='*' --node.staker.enable=false \
#     --persistent.chain=/tmp/nitro-data &
#
# Env:
#   NITRO_IMAGE  — override Nitro node image (default offchainlabs/nitro-node:v3.2.1-d81324d)
#   ANVIL_PORT   — override Anvil port (default 8545)
#   NITRO_PORT   — override Nitro RPC port (default 8547)

services:
  # ── Arbitrum Nitro dev node (Stylus-enabled) ──────────────────────────────
  nitro:
    image: "${NITRO_IMAGE:-offchainlabs/nitro-node:v3.2.1-d81324d}"
    container_name: xb77-nitro
    restart: unless-stopped
    ports:
      - "${NITRO_PORT:-8547}:8547"
      - "${NITRO_WS_PORT:-8548}:8548"
    command:
      - "--dev"
      - "--dev.init-message=Welcome to xB77 Sovereign OS local Arbitrum Stylus node"
      - "--http.api=net,web3,eth,arb,debug"
      - "--http.addr=0.0.0.0"
      - "--http.port=8547"
      - "--http.vhosts=*"
      - "--http.corsdomain=*"
      - "--ws.addr=0.0.0.0"
      - "--ws.port=8548"
      - "--ws.origins=*"
      - "--node.staker.enable=false"
      - "--init.empty=true"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-X", "POST", "http://localhost:8547",
             "-H", "Content-Type: application/json",
             "-d", "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"eth_blockNumber\",\"params\":[]}"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s

  # ── Anvil — lightweight EVM for Solidity contracts ────────────────────────
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: xb77-anvil
    restart: unless-stopped
    ports:
      - "${ANVIL_PORT:-8545}:8545"
    entrypoint:
      - anvil
      - "--host=0.0.0.0"
      - "--port=8545"
      - "--chain-id=31337"
      - "--block-time=1"
      - "--accounts=10"
      - "--balance=10000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-X", "POST", "http://localhost:8545",
             "-H", "Content-Type: application/json",
             "-d", "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"eth_blockNumber\",\"params\":[]}"]
      interval: 2s
      timeout: 3s
      retries: 15

  # ── Nargo proof generation worker (optional, heavy) ──────────────────────
  # Provides Nargo + Barretenberg in a container with all native libs.
  # Usage: docker compose run --rm nargo-prover nargo prove --program-dir circuits/state_anchor
  nargo-prover:
    image: ghcr.io/noir-lang/noir:v0.36.0
    container_name: xb77-nargo
    profiles: ["prover"]
    working_dir: /circuits
    volumes:
      - ./circuits:/circuits:ro
      - ./proofs:/proofs
    entrypoint: ["nargo"]
    command: ["--version"]

volumes: {}
networks:
  default:
    name: xb77-local
