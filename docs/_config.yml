# Jekyll configuration for the xB77 docs site (served via GitHub Pages).
# Kept intentionally minimal: the landing is a hand-written index.html so
# we only need Jekyll to render the surrounding *.md pages and provide
# permalinks for the nav links to work.

title: xB77 — Sovereign Financial OS
description: >-
  Onchain ZK verifier with chunked PDA buffer, custom Poseidon BN254
  compression, and a native Zig client. No SDK lock-in, no Helius, no
  QuickNode — sovereign stack end to end.
url: ""
baseurl: ""

# Default theme. Minima ships with GH Pages and gives us a usable
# layout for the *.md files without bringing extra deps.
theme: minima

# Pretty permalinks: DEMO_FRONTIER.md -> /DEMO_FRONTIER/
permalink: /:path/

# index.html is custom + standalone, so do not let any layout wrap it.
defaults:
  - scope:
      path: "index.html"
    values:
      layout: null

include:
  - planning
  - superpowers

exclude:
  - "*.tmp"
  - "Gemfile"
  - "Gemfile.lock"
