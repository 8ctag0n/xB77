name: Build

# CI for day-to-day development. Releases live in their own workflow
# (release.yml) so tagging never piggybacks off a regular branch build,
# and a flaky CI run on main can't block a release.
on:
  push:
    branches: ["bedrock", "main", "merge/**"]
    paths:
      - "build.zig"
      - "build.zig.zon"
      - "core/**"
      - "cli/**"
      - "gateway/**"
      - "znode/**"
      - "onchain/**"
      - "circuits/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "infra/Containerfile.zk"
      - "infra/Containerfile.solana_slim"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "build.zig"
      - "build.zig.zon"
      - "core/**"
      - "cli/**"
      - "gateway/**"
      - "znode/**"
      - "onchain/**"
      - "circuits/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "infra/Containerfile.zk"
      - "infra/Containerfile.solana_slim"
      - ".github/workflows/build.yml"
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read    # required to pull the toolchain images from GHCR

jobs:
  # ─────────────────────────────────────────────────────────
  # Zig host build — produces xb77 CLI, e2e runners, gateway.wasm
  # Stays on the GHA-hosted runner with `mlugg/setup-zig` because Zig is
  # cheap to install and we don't gain much from a custom container here.
  # ─────────────────────────────────────────────────────────
  zig-build:
    name: Zig (host + wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # znode-server links against -lcurl (see znode/main.c). The hosted
      # ubuntu-latest image does not ship libcurl headers, so install them
      # before invoking the Zig build.
      - name: Install libcurl headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev

      - uses: mlugg/setup-zig@v2
        with:
          # 0.15.2 was a dev snapshot that was un-published from
          # ziglang.org/builds; mlugg's mirrors return 404 for it.
          # 0.15.1 is the last stable release in the 0.15 series and
          # has the same std API surface our code targets.
          version: 0.15.1

      - name: Cache zig artifacts
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache
            zig-out
          key: zig-${{ runner.os }}-${{ hashFiles('build.zig', 'core/**/*.zig', 'cli/**/*.zig', 'gateway/**/*.zig') }}
          restore-keys: |
            zig-${{ runner.os }}-

      # Mirror release.yml: ReleaseSafe for binaries (small + checked),
      # ReleaseSmall for the WASM bundle (Cloudflare Workers free tier
      # caps the worker module at 1 MB compressed).
      - name: Build host targets (xb77 + e2e runners)
        run: zig build install -Doptimize=ReleaseSafe

      - name: Build gateway WASM
        run: zig build wasm -Doptimize=ReleaseSmall

      - name: Verify wasm produced is real (>50 KB, not the 120 B stub)
        run: |
          size=$(stat -c%s zig-out/bin/gateway.wasm)
          echo "gateway.wasm size: $size bytes"
          test "$size" -gt 50000 || (echo "::error::gateway.wasm regressed to a stub" && exit 1)

      - name: Upload host artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zig-binaries
          path: |
            zig-out/bin/xb77
            zig-out/bin/gateway.wasm
            zig-out/bin/zk-upload-e2e
          if-no-files-found: error
          retention-days: 30

  # ─────────────────────────────────────────────────────────
  # Onchain BPF — runs INSIDE ghcr.io/<owner>/xb77-solana for cargo-build-sbf.
  # Matrix one per program so failures are isolated.
  # ─────────────────────────────────────────────────────────
  onchain-build:
    name: BPF / ${{ matrix.program }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/xb77-solana:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        program:
          - xb77_core
          - xb77_gateway
          - xb77_registry
          - xb77.iopression
          - xb77_zk_verifier
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo + sbf artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            onchain/programs/${{ matrix.program }}/target
          key: bpf-${{ matrix.program }}-${{ hashFiles(format('onchain/programs/{0}/Cargo.lock', matrix.program)) }}

      - name: Build BPF program
        working-directory: onchain/programs/${{ matrix.program }}
        run: cargo build-sbf

      - name: Assert .so artifact exists
        run: |
          so_path="onchain/programs/${{ matrix.program }}/target/deploy/${{ matrix.program }}.so"
          test -f "$so_path" || (echo "::error::Missing $so_path" && exit 1)
          echo "$so_path: $(stat -c%s "$so_path") bytes"

      - name: Upload BPF artifact
        uses: actions/upload-artifact@v4
        with:
          name: bpf-${{ matrix.program }}
          path: onchain/programs/${{ matrix.program }}/target/deploy/${{ matrix.program }}.so
          if-no-files-found: error
          retention-days: 30

  # ─────────────────────────────────────────────────────────
  # Noir circuit — compile only (prove is too heavy for default CI).
  # Runs INSIDE ghcr.io/<owner>/xb77-zk so Noir 0.36 + bb 0.58 are pinned.
  # ─────────────────────────────────────────────────────────
  zk-circuit:
    name: Noir circuit (compile only)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/xb77-zk:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Compile circuit
        working-directory: circuits/zk_receipt
        run: nargo compile

      - name: Upload compiled circuit
        uses: actions/upload-artifact@v4
        with:
          name: zk-circuit
          path: circuits/zk_receipt/target/zk_receipt.json
          if-no-files-found: warn
          retention-days: 30
