name: Deploy Docs

# Builds the Jekyll site under ./docs and publishes it to GitHub Pages.
# The landing (docs/index.html) is a hand-written cyberpunk page; the
# surrounding *.md files (DEMO_FRONTIER, SESSION_BRIEF, planning/, ...)
# are rendered by Jekyll's default minima theme so the nav links resolve
# to actual pages.
#
# Repo Settings -> Pages -> Build and deployment -> Source: 'GitHub Actions'
# (one-time setup; nothing else to configure).

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; let later pushes pile up.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
