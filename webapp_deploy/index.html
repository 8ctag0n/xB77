<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { margin: 0; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  :root {
    --serif: 'Instrument Serif', Georgia, serif;
    --sans: 'DM Sans', Helvetica, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  ::selection { background: rgba(200,255,46,0.25); }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }

  @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-33.333%); } }
  @keyframes fadeInLine { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes glowPulse { 0%, 100% { box-shadow: 0 0 0 rgba(200,255,46,0); } 50% { box-shadow: 0 0 20px rgba(200,255,46,0.15); } }
  @keyframes livePulse { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
  @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
  /* ── Magic additions for the Explorer ── */
  @keyframes rowFlyIn { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes dashFlow { 0% { stroke-dashoffset: 100; } 100% { stroke-dashoffset: 0; } }
  @keyframes ringPulse { 0% { transform: scale(0.6); opacity: 0.55; } 100% { transform: scale(2.2); opacity: 0; } }
  @keyframes statusPulse { 0%, 100% { box-shadow: 0 0 0 0 currentColor, 0 0 10px currentColor; } 50% { box-shadow: 0 0 0 4px transparent, 0 0 14px currentColor; } }
  @keyframes scanlineSlide { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
  @keyframes idGlitch { 0%, 92%, 100% { transform: translateX(0); filter: none; } 93% { transform: translateX(-1px); filter: hue-rotate(40deg); } 95% { transform: translateX(1px); filter: hue-rotate(-30deg); } 97% { transform: translateX(0); filter: none; } }
