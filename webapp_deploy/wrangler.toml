# Cloudflare Pages config for the xB77 Public Web App.
# Co-located here so `wrangler pages dev .` picks it up automatically
# (Pages does not support --config for arbitrary paths).
name = "xb77-public-app"
compatibility_date = "2026-05-11"
pages_build_output_dir = "."

[vars]
ENVIRONMENT = "production"
API_URL = "https://xb77-gateway.8ctag0n.workers.dev"
