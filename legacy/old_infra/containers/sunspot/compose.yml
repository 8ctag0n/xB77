services:
  sunspot-dev:
    build:
      context: .
      dockerfile: Containerfile
    image: xb77-sunspot:local
    container_name: sunspot-dev
    network_mode: "host"
    working_dir: /work
    entrypoint: ["bash", "-lc"]
    command: ["tail -f /dev/null"]
    volumes:
      - ${SUNSPOT_REPO}:/work
